url: https://StatisticsHealthEconomics.github.io/outstandR/

authors:
  Nathan Green:
    href: https://n8thangreen.github.io/

build:
  vignettes: false

news:
  cran_dates: false

template:
  bootstrap: 5
  # theme: atom-one-light
  bslib:
    font_scale: 1.0
  params:
    bootswatch: flatly

navbar:
  structure:
    left:  [home, reference, articles, news]
    right: [search, github]
  components:
    home:
      text: "Home"
      href: index.html
    reference:
      text: "Functions"
      href: reference/index.html
    articles:
      text: "Articles"
      href: articles/index.html
    news:
      text: "News" 
      href: news/index.html

reference:
- title: "Main"
  desc: "Main analysis functions."
  contents:
  # - outstandR-package
  - starts_with("outstandR")
  - strategy
- title: "Constituent statistics"
  desc: "Helper functions used by the main functions."
  contents:
  - marginal_treatment_effect
  - marginal_variance
  - calculate_trial_variance
  - calculate_ate
  - calculate_trial_mean
  - calculate_trial_mean_binary
  - calculate_trial_mean_continuous
  - calculate_trial_mean_count
  - calculate_trial_variance_binary
  - calculate_trial_variance_continuous
  - calculate_trial_variance_count
  - estimate_var_sandwich
  - starts_with("calc_")
  - get_treatment_effect
- title: "Miscellaneous"
  contents:
  - print.outstandR
  - plot.outstandR
  - summary.outstandR
  - reshape_ald_to_long
  - reshape_ald_to_wide
- title: "Data"
  contents:
  - AC_IPD_binY_contX
  - BC_ALD_binY_contX
  - AC_IPD_contY_mixedX
  - AC_IPD_countY_contX
  - BC_ALD_contY_mixedX
  - BC_ALD_countY_contX
- title: "Classes"
  contents:
  - strategy-class

